services:
  - type: web
    name: predictive-maintenance
    env: python
    plan: free
    pythonVersion: 3.12
    buildCommand: |
      cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      - name: event_data
        mountPath: /data/events
        sizeGB: 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12
